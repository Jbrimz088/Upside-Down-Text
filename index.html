<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upside Down Tool</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .container {
            background: #161b22;
            padding: 30px;
            border-radius: 6px;
            border: 1px solid #30363d;
        }
        h2 { margin-top: 0; color: #58a6ff; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; font-size: 0.9em; }
        textarea {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            box-sizing: border-box;
            font-family: monospace;
            height: 120px;
            resize: vertical;
        }
        /* Rotates the entire container to flip text upside down */
        #outputText { 
            background: #0d1117; 
            border-left: 4px solid #58a6ff;
            font-size: 24px;
            transform: rotate(180deg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 120px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Upside Down Tool</h2>
    
    <label for="inputText">Input Data</label>
    <textarea id="inputText" placeholder="Type here..."></textarea>

    <label for="outputText">Output Result</label>
    <div id="outputText"></div>
</div>

<script>
    const input = document.getElementById('inputText');
    const output = document.getElementById('outputText');

    input.addEventListener('input', () => {
        // Reverses the string and updates the div content
        output.innerText = input.value.split('').reverse().join('');
    });
</script>

</body>
</html>
