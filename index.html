<!DOCTYPE html>
<html>
<head>
    <title>Upside Down Text</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        textarea { width: 100%; height: 100px; display: block; margin-bottom: 20px; }
        #output { font-size: 24px; word-wrap: break-word; }
    </style>
</head>
<body>

<textarea id="input" placeholder="Type here..."></textarea>
<div id="output"></div>

<script>
    const map = {
        'a': 'ɐ', 'b': 'q', 'c': 'ɔ', 'd': 'p', 'e': 'ǝ', 'f': 'ɟ', 'g': 'ƃ', 'h': 'ɥ', 
        'i': 'ᴉ', 'j': 'ɾ', 'k': 'ʞ', 'l': 'ㄥ', 'm': 'ɯ', 'n': 'u', 'o': 'o', 'p': 'd', 
        'q': 'b', 'r': 'ɹ', 's': 's', 't': 'ʇ', 'u': 'n', 'v': 'ʌ', 'w': 'ʍ', 'x': 'x', 
        'y': 'ʎ', 'z': 'z', 'A': '∀', 'B': '𐐒', 'C': 'Ɔ', 'D': '◖', 'E': 'Ǝ', 'F': 'Ⅎ', 
        'G': 'פ', 'H': 'H', 'I': 'I', 'J': 'Ր', 'K': 'ʞ', 'L': '˥', 'M': 'W', 'N': 'N', 
        'O': 'O', 'P': 'Ԁ', 'Q': 'Ό', 'R': 'ᴚ', 'S': 'S', 'T': '⊥', 'U': '∩', 'V': 'Λ', 
        'W': 'M', 'X': 'X', 'Y': '⅄', 'Z': 'Z', ' ': ' '
    };

    const input = document.getElementById('input');
    const output = document.getElementById('output');

    input.addEventListener('input', () => {
        const text = input.value.split('').reverse().join('');
        output.innerText = text.split('').map(char => map[char] || char).join('');
    });
</script>

</body>
</html>
