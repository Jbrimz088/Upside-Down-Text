<!DOCTYPE html>
<html>
<head>
    <title>Upside Down Text</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: #00ff9d; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px; 
        }
        textarea { 
            width: 80%; 
            max-width: 600px; 
            height: 150px; 
            background: #2d2d2d; 
            border: 2px solid #00ff9d; 
            border-radius: 12px; 
            color: #fff; 
            padding: 20px; 
            font-size: 18px; 
            outline: none;
            transition: 0.3s;
        }
        textarea:focus { border-color: #fff; box-shadow: 0 0 15px #00ff9d; }
        #output { 
            margin-top: 40px; 
            font-size: 48px; 
            transform: rotate(180deg); 
            text-align: center;
            min-height: 60px;
            cursor: default;
        }
    </style>
</head>
<body>

<textarea id="input" placeholder="Type here to flip it..."></textarea>
<div id="output"></div>

<script>
    const map = {
        'a': 'ɐ', 'b': 'q', 'c': 'ɔ', 'd': 'p', 'e': 'ǝ', 'f': 'ɟ', 'g': 'ƃ', 'h': 'ɥ', 
        'i': 'ᴉ', 'j': 'ɾ', 'k': 'ʞ', 'l': '7', 'm': 'ɯ', 'n': 'u', 'o': 'o', 'p': 'd', 
        'q': 'b', 'r': 'ɹ', 's': 's', 't': 'ʇ', 'u': 'n', 'v': 'ʌ', 'w': 'ʍ', 'x': 'x', 
        'y': 'ʎ', 'z': 'z', '7': '7'
    };

    const input = document.getElementById('input');
    const output = document.getElementById('output');

    input.addEventListener('input', () => {
        output.innerText = input.value.split('').reverse().map(char => map[char.toLowerCase()] || char).join('');
    });
</script>

</body>
</html>
